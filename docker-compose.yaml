services:
  postgres_db:
    networks: 
      - elt_network
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weather_db
    volumes:
      - ./source_db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  ingestion:
    networks: 
      - elt_network
    build: ./ingestion
    depends_on:
      postgres_db:  
        condition: service_healthy
        restart: true
    env_file:
      - .env
    volumes:
      - ./sales_data:/app/sales_data

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.4
    networks: 
      - elt_network
    volumes:
      - ./postgres_transformations/dbt:/usr/app/dbt
      - ~/.dbt:/root/.dbt
    environment:
      DBT_PROFILE: default
      DBT_TARGET: dev
    depends_on:
      postgres_db:
        condition: service_healthy
      ingestion:
        condition: service_completed_successfully

networks:
  elt_network:
    driver: bridge
