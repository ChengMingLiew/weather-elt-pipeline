services:
  postgres_db:
    networks: 
      - weather_elt_network
    image: postgres:18
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weather_db
    volumes:
      - ./source_db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  weather_ingestion:
    networks: 
      - weather_elt_network
    build: ./weather-ingestion
    depends_on:
      postgres_db:
        condition: service_healthy
        restart: true
    env_file:
      - .env

networks:
  weather_elt_network:
    driver: bridge
